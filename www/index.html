<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#FFFFFF">
<title>LifeLine</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:#FFFFFF;color:#212121;overflow:hidden;
    min-height:100dvh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;}
  .glow{position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);
    width:380px;height:380px;border-radius:50%;
    background:radial-gradient(circle,rgba(229,57,53,.12) 0%,rgba(229,57,53,0) 65%);
    filter:blur(6px);animation:breathe 2.6s ease-in-out infinite;pointer-events:none;}
  .logo{width:120px;height:120px;margin:0 auto 24px;filter:drop-shadow(0 14px 30px rgba(198,40,40,.25))}
  .ecg{stroke-dasharray:1200;stroke-dashoffset:1200;animation:draw 1.1s ease-out .2s forwards}
  h1{font-size:30px;font-weight:800;letter-spacing:.3px;color:#C62828}
  p{margin-top:10px;font-size:14px;color:#6B7280;max-width:300px}
  .tag{margin-top:6px;font-size:11px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:#9AA0A6}
  .btn{margin-top:28px;padding:14px 34px;border:none;border-radius:14px;
    background:linear-gradient(180deg,#E53935,#C62828);color:#fff;font-size:15px;font-weight:700;
    cursor:pointer;box-shadow:0 10px 24px -6px rgba(229,57,53,.5);}
  .btn:active{transform:translateY(1px)}
  @keyframes draw{to{stroke-dashoffset:0}}
  @keyframes breathe{0%,100%{opacity:.55;transform:translate(-50%,-50%) scale(1)}50%{opacity:.9;transform:translate(-50%,-50%) scale(1.08)}}
</style>
</head>
<body>
  <div class="glow"></div>
  <div>
    <svg class="logo" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
      <defs><linearGradient id="hg" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#E53935"/><stop offset="1" stop-color="#C62828"/></linearGradient></defs>
      <g transform="translate(110,108)">
        <path fill="url(#hg)" d="M0,-40 C 22,-78 70,-78 86,-44 C 102,-12 76,26 0,92 C -76,26 -102,-12 -86,-44 C -70,-78 -22,-78 0,-40 Z"/>
        <path class="ecg" fill="none" stroke="#FFFFFF" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"
          d="M -78,8 L -28,8 L -14,8 L -2,-26 L 13,44 L 26,-8 L 38,8 L 80,8"/>
      </g>
    </svg>
    <h1>LifeLine</h1>
    <div class="tag">Every Second Saves a Life</div>
    <p id="msg">Couldn't reach the network. Check your connection and try again.</p>
    <button class="btn" onclick="retry()">Retry</button>
  </div>
<script>
  var APP_URL = 'https://lifelineemergency.replit.app';
  function retry(){ document.getElementById('msg').textContent = 'Reconnecting…'; window.location.href = APP_URL; }
  // Auto-retry once we regain connectivity
  window.addEventListener('online', function(){ window.location.href = APP_URL; });
</script>
</body>
</html>
